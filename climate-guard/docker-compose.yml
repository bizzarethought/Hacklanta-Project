version: "3.9"
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    volumes:
      - .:/app
      - ./cache:/app/cache
    depends_on:
      - db

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: climateguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
