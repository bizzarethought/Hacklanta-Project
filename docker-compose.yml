services:
  api:
    build:
      context: ./climate-guard
    ports:
      - "8000:8000"
    env_file:
      - ./climate-guard/backend/.env
    volumes:
      - ./climate-guard:/app
      - ./climate-guard/cache:/app/cache
    depends_on:
      - db

  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: climateguard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
